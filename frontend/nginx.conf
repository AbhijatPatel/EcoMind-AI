server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip common text assets — meaningfully shrinks the JS/CSS bundle over
    # the wire without needing a CDN in front of this container.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # SPA fallback: any path that isn't a real file goes to index.html so
    # React Router can handle client-side routes like /dashboard directly
    # (otherwise a hard refresh on /dashboard would 404 at the Nginx level).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed build assets; index.html itself is deliberately not
    # cached here so a new deploy is picked up on next load.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
